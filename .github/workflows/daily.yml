name: Daily Truth

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's truth
        run: node generate.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "pyoba-bot"
          git config user.email "bot@pyoba.com"
          git add index.html
          git diff --staged --quiet || git commit -m "$(date +'%Y-%m-%d') — daily truth"
          git push
