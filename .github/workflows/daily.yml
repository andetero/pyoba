name: Daily Puzzle

on:
  schedule:
    # Midnight CST = 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's puzzle
        run: node generate.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "gist-bot"
          git config user.email "bot@pyoba.com"
          git add index.html puzzles.json
          git diff --staged --quiet || git commit -m "puzzle #$(date +'%Y-%m-%d')"
          git push
