name: Fetch App Data

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6am UTC
  workflow_dispatch:        # also lets you trigger it manually from GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch iTunes data
        run: |
          curl -s "https://itunes.apple.com/lookup?id=6760603110,6760981351,6761038219,6761126977,6761673183,6761800197,6761319280" \
            -o apps.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --staged --quiet || git commit -m "chore: refresh app data"
          git push
